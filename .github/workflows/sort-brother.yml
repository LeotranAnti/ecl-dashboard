name: Sort Brother Sheet (Every 5 min, 24/7)

on:
  schedule:
    # Chạy mỗi 5 phút, 24/7 — không cần Mac, hoàn toàn tự động
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Cho phép chạy thủ công nếu cần

jobs:
  sort-brother:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger Sort Brother via Vercel API
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://dashboardextension.vercel.app/api/sort-brother?token=ecl-brother-sort-2026")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "Status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Error: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Sort completed"
